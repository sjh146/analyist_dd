services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stock_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - stock_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15
    container_name: stock_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["graph-data-science"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - stock_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stock_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - stock_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  news-analyzer:
    build:
      context: ./services/news-analyzer
      dockerfile: Dockerfile
    container_name: stock_news_analyzer
    env_file: .env
    volumes:
      - ./services/news-analyzer:/app
      - ./data/disclosures:/app/data
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped

  yfinance-collector:
    build:
      context: ./services/yfinance-collector
      dockerfile: Dockerfile
    container_name: stock_yfinance_collector
    env_file: .env
    volumes:
      - ./services/yfinance-collector:/app
      - ./data/market:/app/data
      - ./data/financials:/app/data/financials
      - ./data/macro:/app/data/macro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped

  krx-collector:
    build:
      context: ./services/krx-collector
      dockerfile: Dockerfile
    container_name: stock_krx_collector
    env_file: .env
    volumes:
      - ./services/krx-collector:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped

  stock-vectorizer:
    build:
      context: ./services/stock-vectorizer
      dockerfile: Dockerfile
    container_name: stock_vectorizer
    env_file: .env
    volumes:
      - ./services/stock-vectorizer:/app
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped

  xgboost-ml:
    build:
      context: ./services/xgboost-ml
      dockerfile: Dockerfile
    container_name: stock_xgboost_ml
    env_file: .env
    volumes:
      - ./services/xgboost-ml:/app
      - ./models:/app/models
      - ./data/macro:/app/data/macro
      - ./data/financials:/app/data/financials
      - ./data/disclosures:/app/data/disclosures
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped

  strategy-agents:
    build:
      context: ./services/strategy-agents
      dockerfile: Dockerfile
    container_name: stock_strategy_agents
    env_file: .env
    volumes:
      - ./services/strategy-agents:/app
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: stock_api_gateway
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./services/api-gateway:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    networks:
      - stock_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning
    networks:
      - stock_network
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/jenkins/init.groovy:/var/jenkins_home/init.groovy.d/init.groovy
      - ./config/jenkins/plugins.txt:/usr/share/jenkins/ref/plugins.txt
    networks:
      - stock_network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: stock_postgres_exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - stock_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  economic-calendar:
    build:
      context: ./services/economic-calendar
      dockerfile: Dockerfile
    container_name: stock_economic_calendar
    env_file: .env
    volumes:
      - ./services/economic-calendar:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: stock_redis_exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    networks:
      - stock_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  prometheus_data:
  grafana_data:
  jenkins_home:

networks:
  stock_network:
    driver: bridge
